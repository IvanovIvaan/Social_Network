<div class="form-container form-registration">
    <nav class="auth-links">
        <span class= "active">Реєстрація</span>
        <span class= "inactive" id= "login-button">Авторизація</span>
    </nav>

    <div class="title-text">
        <p>Приєднуйтеся до World IT</p>
    </div>
    
    <form id='register-form' action="{% url 'register' %}" method="post">
        {% csrf_token %}
        {{ form_registration.as_p }}
        <button type="submit">Створити акаунт</button>
    </form>
    <div id="register-errors"></div>
</div>
